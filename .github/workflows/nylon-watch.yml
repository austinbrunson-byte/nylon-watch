name: nylon-watch

# Polls shops on a schedule, scores text + image gloss, commits state back.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC, best-effort)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: nylon-watch
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install visual-stage deps
        run: pip install --quiet pillow numpy

      - name: Run poller
        env:
          NTFY_BASE: ${{ secrets.NTFY_BASE }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: python3 poller.py

      - name: Commit updated state + image cache
        run: |
          git config user.name "nylon-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json imgcache.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "state update $(date -u +%FT%TZ)"
            git push
          fi
